services:
  db:
    # Using TimescaleDB as it's more feature-rich and was mentioned in the file
    image: timescale/timescaledb:latest-pg15
    container_name: nexa_db
    restart: always
    environment:
      # These variables are read from the .env file
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Expose for local DB client access
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexa_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexa_backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      # Mount the backend code for hot-reloading (matches WORKDIR in Dockerfile)
      - ./backend:/code
    ports:
      - "8000:8000"
    env_file:
      # Load all variables from the .env file
      - .env
    environment:
      # Override/set the host to the service name for inter-container communication
      - POSTGRES_HOST=db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # This test runs inside the container
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexa_frontend
    restart: always
    volumes:
      # Mount the frontend code for hot-reloading
      - ./frontend:/app
      # Use an anonymous volume to prevent host node_modules from overwriting container's
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      # For Client-Side Rendering (in the browser), connects to the host machine's exposed port
      - NEXT_PUBLIC_API_URL=http://localhost:8000 
      # Enable polling for file changes, which is more reliable in some Docker environments
      - CHOKIDAR_USEPOLLING=true
      # For Server-Side Rendering (inside the container), connects to the backend service name
      - INTERNAL_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy # Wait for backend to be healthy before starting
    healthcheck:
      # This test runs inside the container
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
