# render.yaml
# This file configures your application for deployment on Render.
# Place it in the root of your repository.
# See https://render.com/docs/blueprint-spec for more details.

databases:
  # 1. PostgreSQL Database
  - name: nexa-db
    databaseName: nexa_mvp
    plan: free # Or a paid plan for production
    # Render will automatically set the POSTGRES_USER and POSTGRES_PASSWORD
    # from your environment group or generate new ones.
    # The DATABASE_URL will be available to other services.

redis:
  # 2. Redis Cache
  - name: nexa-redis
    plan: free # Or a paid plan for production
    # The REDIS_URL will be available to other services.

services:
  # 3. Backend API (FastAPI)
  - type: web
    name: nexa-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    healthCheck:
      path: /api/health
    envVars:
      - key: DATABASE_URL
        fromService:
          type: psql
          name: nexa-db
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexa-redis
      - key: SECRET_KEY # IMPORTANT: Set this as a secret in your Render Environment Group
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      # This tells Gunicorn how many worker processes to run.
      - key: WEB_CONCURRENCY
        value: 4 # Adjust based on your plan's CPU/memory
    # Production start command using Gunicorn for performance and stability.
    # Ensure gunicorn and uvicorn are in your backend's requirements.txt.
    # This command first applies database migrations and then starts the production server.
    startCommand: alembic upgrade head && gunicorn -k uvicorn.workers.UvicornWorker -w $WEB_CONCURRENCY -b 0.0.0.0:8000 app.main:app

  # 4. Frontend Web App (Next.js)
  - type: web
    name: nexa-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    healthCheck:
      path: /
    envVars:
      # URL for client-side API calls (points to the backend's public URL)
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: nexa-backend
          property: url
      # URL for server-side API calls (points to the backend's internal service address)
      - key: INTERNAL_API_URL
        fromService:
          type: web
          name: nexa-backend
          property: host # Use 'host' for internal, 'url' for public
    # The default start command for a Next.js app is usually `npm start`.
    # Ensure your frontend/package.json has a "start": "next start" script.
jobs:
  # 5. Database Seeding Job
  - name: nexa-db-seed
    name: nexa-db-seed
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    # This job runs a script to seed the database. It only runs when you trigger it from the Render dashboard.
    startCommand: python -c "from app.initial_data import seed_db; from app.core.database import SessionLocal; db = SessionLocal(); seed_db(db); db.close(); print('Database seeding complete.')"
    envVars:
      - key: DATABASE_URL
        fromService:
          type: psql
          name: nexa-db