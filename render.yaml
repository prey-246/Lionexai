databases:
  # 1. PostgreSQL Database (defined as a top-level database service)
  - name: nexa-db
    databaseName: nexa_mvp
    user: nexa_admin
    plan: free

services:
  # 2. Redis Instance
  - type: redis
    name: nexa-redis
    plan: free

  # 3. FastAPI Backend Service
  - type: web
    name: nexa-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /api/health
    # Command to run migrations before starting the server
    startCommand: "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    envVars:
      # --- Secrets (Create these in Render's "Environment" tab) ---
      - key: SECRET_KEY
        generateValue: true # Let Render generate a secure secret key
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: nexa-db
          property: password

      # --- Linked Environment Variables ---
      - key: POSTGRES_USER
        fromDatabase:
          name: nexa-db
          property: user
      - key: POSTGRES_DB
        fromDatabase:
          name: nexa-db
          property: database
      - key: POSTGRES_HOST
        fromDatabase:
          name: nexa-db
          property: host
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexa-redis
          property: connectionString

  # 4. Next.js Frontend Service (Public Facing)
  - type: web
    name: nexa-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    envVars:
      # NEXT_PUBLIC_API_URL is intentionally omitted.
      # Client-side requests will use relative paths to trigger the rewrite rules.
      - key: INTERNAL_API_URL # For server-side rendering within the container
        value: http://nexa-backend:8000
    # --- Reverse Proxy Rules ---
    # Route API and WebSocket traffic to the backend service
    rewrites:
      - source: /api/:path* # Proxy all API and WebSocket traffic to the backend
        destination: http://nexa-backend:8000/api/:path*