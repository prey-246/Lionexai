databases:
  # 1. PostgreSQL Database
  - name: nexa-db
    databaseName: nexa_mvp
    user: nexa_admin
    plan: free

services:
  # 2. Redis Instance
  - type: redis
    name: nexa-redis
    plan: free
    ipAllowList: [] # Allow all internal Render services

  # 3. FastAPI Backend Service (Internal)
  - type: web
    name: nexa-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: nexa-db
          property: password
      - key: POSTGRES_USER
        fromDatabase:
          name: nexa-db
          property: user
      - key: POSTGRES_DB
        fromDatabase:
          name: nexa-db
          property: database
      - key: POSTGRES_HOST
        fromDatabase:
          name: nexa-db
          property: host
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexa-redis
          property: connectionString

  # 4. Next.js Frontend Service (Public Facing with Reverse Proxy)
  - type: web
    name: nexa-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    envVars:
      # For Server-Side Rendering, the frontend container talks to the backend container directly.
      - key: INTERNAL_API_URL
        value: http://nexa-backend:8000
    # --- Reverse Proxy Rules ---
    rewrites:
      # Route all API and WebSocket traffic to the internal backend service
      - source: /api/:path*
        destination: http://nexa-backend:8000/api/:path*
